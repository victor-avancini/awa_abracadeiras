spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/abra}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
  application:
    name: awa-abracadeiras
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  security:
    user:
      name: admin
      password: admin123
management:
  endpoints:
    web:
      exposure:
        include: "health,info,flyway"
  endpoint:
    health:
      show-details: when_authorized
